<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contratos · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#1a4a5c;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 60% 20%,rgba(0,179,152,.15),transparent 60%),radial-gradient(ellipse 400px 300px at 20% 80%,rgba(26,74,92,.3),transparent 55%);pointer-events:none}

.card{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;position:relative;box-shadow:0 25px 60px rgba(0,0,0,.3)}

/* Logo */
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
.logo-img-wrap{width:140px;height:70px;background:#00b398;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;box-shadow:0 4px 16px rgba(0,179,152,.3)}
.logo-savia{font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px;font-style:italic}
.logo-dot{display:inline-block;width:8px;height:8px;background:#1a4a5c;border-radius:50%;margin-bottom:14px;position:relative;top:-8px}
.logo-sub{font-size:11px;font-weight:700;color:#1a4a5c;letter-spacing:2px;text-transform:uppercase}

.divider{height:1px;background:#e8f8f5;margin:0 0 24px}

.card-title{font-size:20px;font-weight:800;color:#1a4a5c;text-align:center;margin-bottom:4px}
.card-sub{font-size:12px;color:#94a3b8;text-align:center;margin-bottom:24px}
.lock{text-align:center;font-size:32px;margin-bottom:12px}

/* Fields */
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#1a4a5c;margin-bottom:6px}
.field input{width:100%;background:#f0faf8;border:1.5px solid #b2e8e0;border-radius:9px;padding:11px 14px;font-family:'Inter',sans-serif;font-size:13px;color:#1a4a5c;outline:none;transition:all .2s}
.field input:focus{border-color:#00b398;box-shadow:0 0 0 3px rgba(0,179,152,.15);background:#fff}
.field input::placeholder{color:#94a3b8}

.btn-login{width:100%;background:#00b398;color:#fff;border:none;border-radius:9px;padding:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;box-shadow:0 4px 16px rgba(0,179,152,.35)}
.btn-login:hover{background:#009e86;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,179,152,.4)}
.btn-login:active{transform:translateY(0)}

.error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:12px;color:#dc2626;margin-bottom:16px;text-align:center}

.footer-txt{text-align:center;font-size:11px;color:#94a3b8;margin-top:20px}
.footer-txt span{color:#00b398;font-weight:600}

/* Decoración esquinas */
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#00b398,#1a4a5c);border-radius:20px 20px 0 0}
</style>
</head>
<body>
<div class="card">
  <!-- Logo Savia -->
  <div class="logo-wrap">
    <div class="logo-img-wrap">
      <div>
        <span class="logo-savia">Contrato
      </div>
    </div>
    <div class="logo-sub">Duplicados Contratos</div>
  </div>

  <div class="divider"></div>

  <div class="lock">🔐</div>
  <div class="card-title">Acceso privado</div>
  <div class="card-sub">Solo usuarios autorizados pueden ingresar</div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="field">
      <label>Usuario</label>
      <input type="text" name="usuario" placeholder="Tu usuario..." autocomplete="username" required>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="clave" placeholder="Tu contraseña..." autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Ingresar →</button>
  </form>

  <div class="footer-txt">¿No tienes acceso? Contacta al <span>administrador</span></div>
</div>
</body>
</html>
